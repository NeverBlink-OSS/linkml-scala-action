id: https://example.org/person
name: person
title: Person schema
prefixes:
  linkml: https://w3id.org/linkml/
  ex: https://example.org/
default_prefix: ex
default_range: string
imports:
  - linkml:types
tree_root: Person
classes:
  Person:
    tree_root: true
    attributes:
      full_name:
        required: true
        range: string
      age:
        range: integer
      email:
        range: string
