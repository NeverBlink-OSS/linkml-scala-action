name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Unit tests + guarantee the committed bundle is in sync with src/.
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Verify dist/ is up to date
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff -- dist/
            exit 1
          fi
      - run: npm test
      - run: npm run coverage

  # Exercise the action itself the way a consumer would, on every OS.
  action-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate a good schema
        uses: ./
        with:
          command: validate
          files: examples/person.yaml

      - name: Generate JSON Schema
        uses: ./
        with:
          command: generate
          generator: json-schema
          files: examples/person.yaml
          output: build/json-schema

      - name: A broken schema should fail
        id: broken
        continue-on-error: true
        uses: ./
        with:
          command: validate
          files: examples/broken.yaml

      - name: Confirm the broken run failed
        if: steps.broken.outcome != 'failure'
        run: |
          echo "::error::Expected validation of broken.yaml to fail."
          exit 1
